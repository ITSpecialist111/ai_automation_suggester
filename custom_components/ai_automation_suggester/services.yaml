generate_suggestions:
  name: Generate Suggestions
  description: "Manually trigger AI automation suggestions."
  fields:
    provider_config:
      name: Provider Configuration
      description: Which provider configuration to use (if you have multiple configured)
      required: false
      selector:
        config_entry:
          integration: ai_automation_suggester
    custom_prompt:
      name: Custom Prompt
      description: Optional custom prompt to override or enhance the default system prompt.
      required: false
      example: "Focus on energy-saving automations"
      selector:
        text:
          multiline: true
    all_entities:
      name: Consider All Entities
      description: "If true, consider all entities instead of just new entities."
      required: false
      default: false
      example: false
      selector:
        boolean: {}
    domains:
      name: Domains
      description: "List of domains to consider. If empty, consider all domains."
      required: false
      default: {}
      selector:
        object: {}
    entity_limit:
      name: Entity Limit
      description: "Maximum number of entities to consider (randomly selected from the chosen domains)."
      required: false
      default: 200
      example: 200
      selector:
        number:
          min: 50
          max: 1000
          mode: slider
    automation_read_yaml:
      name: Read 'automations.yaml' file.
      description: "Reads and appends the yaml code of the automations found in the automations.yaml file. This action will use a lot of input tokens, use it with care and with models with a large input window (e.g. Gemini)."
      required: false
      default: false
      example: false
      selector:
        boolean: {}
    automation_limit:
      name: Automation Limit
      description: "Maximum number of automations to analyze (default: 100)."
      required: false
      default: 100
      example: 100
      selector:
        number:
          min: 10
          max: 500
          mode: slider
    script_read_yaml:
      name: Read 'scripts.yaml' file.
      description: "Reads and appends the yaml code of the scripts found in the scripts.yaml file. This action will use a lot of input tokens, use it with care and with models with a large input window (e.g. Gemini)."
      required: false
      default: false
      example: false
      selector:
        boolean: {}
    script_limit:
      name: Script Limit
      description: "Maximum number of scripts to analyze (default: 100)."
      required: false
      default: 100
      example: 100
      selector:
        number:
          min: 10
          max: 500
          mode: slider
    include_entity_details:
      name: Include Entity Details
      description: "If true, include detailed entity attributes and device information. If false, provide only basic entity information to reduce token usage."
      required: false
      default: true
      example: true
      selector:
        boolean: {}
    debug_mode:
      name: Debug Mode
      description: "If true, returns the final prompt sent to the AI in the description attribute for debugging purposes."
      required: false
      default: false
      example: false
      selector:
        boolean: {}

analyze_error:
  name: Analyze Error (Fix It)
  description: "Analyzes a Home Assistant error log and suggests a fix for a specific automation or script."
  fields:
    provider_config:
      name: Provider Configuration
      description: Which provider configuration to use
      required: false
      selector:
        config_entry:
          integration: ai_automation_suggester
    error_log:
      name: Error Log
      description: "The error message or log entry from Home Assistant."
      required: true
      example: "Invalid config for [automation]: [condition]: entity_id is a required option for dictionary value @ data['action'][0]['service']. Got None"
      selector:
        text:
          multiline: true
    automation_id:
      name: Automation ID
      description: "Optional. The ID of the automation to analyze (if applicable)."
      required: false
      selector:
        text:
    script_id:
      name: Script ID
      description: "Optional. The ID of the script to analyze (if applicable)."
      required: false
      selector:
        text:
    debug_mode:
      name: Debug Mode
      description: "If true, returns the final prompt sent to the AI in the description attribute for debugging purposes."
      required: false
      default: false
      example: false
      selector:
        boolean: {}
